<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>October AI Tour</title>
  <style>
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
    #october-ai { width: 100vw; height: 100vh; }
  </style>
</head>
<body>
  <div id="october-ai"></div>
  <script>
    // Extract tenant ID from URL path: /tour/:id
    var match = window.location.pathname.match(/^\/tour\/([a-zA-Z0-9_-]+)/);
    if (match) {
      var script = document.createElement("script");
      script.src = "/embed.js?v=" + Date.now();
      script.setAttribute("data-tenant", match[1]);
      script.setAttribute("data-container", "october-ai");
      document.body.appendChild(script);
    } else {
      document.getElementById("october-ai").innerHTML = '<p style="color:#fff;text-align:center;padding:40px">Tour not found</p>';
    }
  </script>
</body>
</html>
